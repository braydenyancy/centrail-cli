name: ci
on:
  pull_request:
  push:
    branches: [main]
jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
      - run: npm run build
      - run: npm run typecheck
      - run: npm test
      - id: scanner-surfaces
        run: node scripts/export-scanner-surfaces.mjs
      - name: Prove deployed server accepts every CLI surface
        run: node scripts/check-server-contract.mjs
        env:
          CENTRAIL_EXPECTED_SURFACES: ${{ steps.scanner-surfaces.outputs.surfaces }}
